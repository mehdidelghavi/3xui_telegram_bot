<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 overflow-hidden">

    <!-- Background Effects -->
    <div class="absolute inset-0">
        <div class="absolute top-0 left-0 w-96 h-96 bg-indigo-600/30 rounded-full blur-3xl"></div>
        <div class="absolute bottom-0 right-0 w-96 h-96 bg-cyan-500/20 rounded-full blur-3xl"></div>
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(255,255,255,0.05)_1px,transparent_1px)] bg-[size:30px_30px]"></div>
    </div>

    <div class="relative flex items-center justify-center min-h-screen px-4">

        <div class="w-full max-w-md">

            <!-- Logo -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-gradient-to-br from-indigo-500 to-cyan-500 shadow-2xl shadow-indigo-500/30 mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-white"
                        fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M12 11c0 1.657-1.343 3-3 3S6 12.657 6 11s1.343-3 3-3 3 1.343 3 3zm6 8v-1a4 4 0 00-4-4H8a4 4 0 00-4 4v1"/>
                    </svg>
                </div>

                <h1 class="text-4xl font-bold text-white">
                    Welcome Back
                </h1>

                <p class="text-slate-400 mt-2">
                    Sign in to continue to your dashboard
                </p>
            </div>

            <!-- Login Card -->
            <div class="backdrop-blur-xl bg-white/5 border border-white/10 rounded-3xl p-8 shadow-2xl">

                <form class="space-y-5">

                    <div>
                        <label class="block text-sm text-slate-300 mb-2">
                            Email Address
                        </label>

                        <input
                            type="email"
                            placeholder="you@example.com"
                            class="w-full px-4 py-3 rounded-xl bg-slate-900/60 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                        >
                    </div>

                    <div>
                        <div class="flex justify-between mb-2">
                            <label class="text-sm text-slate-300">
                                Password
                            </label>

                            <a href="#" class="text-sm text-indigo-400 hover:text-indigo-300">
                                Forgot Password?
                            </a>
                        </div>

                        <input
                            type="password"
                            placeholder="••••••••"
                            class="w-full px-4 py-3 rounded-xl bg-slate-900/60 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                        >
                    </div>

                    <div class="flex items-center justify-between">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox"
                                class="rounded border-slate-600 bg-slate-800 text-indigo-500 focus:ring-indigo-500">
                            <span class="text-sm text-slate-400">
                                Remember me
                            </span>
                        </label>
                    </div>

                    <button
                        type="submit"
                        class="w-full py-3 rounded-xl bg-gradient-to-r from-indigo-500 to-cyan-500 text-white font-semibold hover:scale-[1.02] hover:shadow-lg hover:shadow-indigo-500/30 transition duration-300"
                    >
                        Sign In
                    </button>

                </form>

                <!-- Divider -->
                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-slate-700"></div>
                    </div>

                    <div class="relative flex justify-center">
                        <span class="px-4 bg-transparent text-slate-500 text-sm">
                            Or continue with
                        </span>
                    </div>
                </div>

                <!-- Social Login -->
                <div class="grid grid-cols-2 gap-3">

                    <button class="flex items-center justify-center gap-2 py-3 rounded-xl border border-slate-700 bg-slate-900/50 text-slate-300 hover:bg-slate-800 transition">
                        Google
                    </button>

                    <button class="flex items-center justify-center gap-2 py-3 rounded-xl border border-slate-700 bg-slate-900/50 text-slate-300 hover:bg-slate-800 transition">
                        GitHub
                    </button>

                </div>

            </div>

            <p class="text-center text-slate-500 mt-6 text-sm">
                Don't have an account?
                <a href="#" class="text-indigo-400 hover:text-indigo-300">
                    Create Account
                </a>
            </p>

        </div>

    </div>

</body>
</html>
